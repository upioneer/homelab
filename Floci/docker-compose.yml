services:
  floci:
    image: floci/floci:latest
    container_name: floci
    user: root
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - floci_data:/app/data
    environment:
      - FLOCI_STORAGE_MODE=hybrid
      - FLOCI_HOSTNAME=floci
    restart: unless-stopped

volumes:
  floci_data:
