services:
  unsloth_studio:
    image: unsloth/unsloth
    container_name: unsloth_studio
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "8000:8000"
      - "2222:22"
    environment:
      - JUPYTER_PASSWORD=mypassword
    volumes:
      - ./work:/workspace/work
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
